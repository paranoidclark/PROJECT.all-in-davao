<div class="auth-wrapper">

  <div class="auth-card">
    <h2 class="auth-title">Login</h2>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="input-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="Enter your email" formControlName="email">
      </div>

      <div class="input-group">
        <div class="label-row">
          <label for="login-password">Password</label>
          <a href="#" class="forgot-link">Forgot your password?</a>
        </div>
        <input type="password" id="login-password" placeholder="Enter your password" formControlName="password">
      </div>

      <button type="submit" class="btn-primary">Sign in</button>

      <p class="switch-form">
        Don't have an account? <a routerLink="/signup">Create Account</a>
      </p>
    </form>
  </div>

</div>
