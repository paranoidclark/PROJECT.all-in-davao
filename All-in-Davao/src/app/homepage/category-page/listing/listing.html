<section class="category-page">
  <div class="hero-section">

    <div class="category-spiel">
      <h2>{{ categoryData?.title }}</h2>
      <p>{{ categoryData?.description }}</p>
    </div>

    <img [src]="categoryData?.image?.imageURL" [alt]="categoryData?.image?.imageURL" class="category-image">
  </div>

  <div>
    <h3 class="category-subsection-title">List of Places to Visit!</h3>
  </div>

  <div class="restaurant-grid">
    @for (data of placeData; track data.placeID) {
      <div class="restaurant-card" [routerLink]="['/explore', category(), data.placeID]">

        <div class="card-image">
          <img [src]="data.image?.imageURL" [alt]="data.image?.name">

          <div class="rating-badge">
              <span class="start">★</span> {{ data.rating }}
          </div>
        </div>

        <div class="card-content">

          <h3 class="card-title"> {{ data.name }}</h3>

          <div class="card-location">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span>{{ data.location }}</span>
          </div>

          <div class="tag-container">
            @for (tag of data.placeTags; track tag) {
              <div class="card-tags">
                <span class="tag">{{ tag.tag.tagName }}</span>
              </div>
            }
          </div>

        </div>

      </div>
    }
  </div>
</section>
