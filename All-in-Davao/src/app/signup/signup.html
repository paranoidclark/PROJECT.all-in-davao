<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Signup</h2>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="input-group">
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" placeholder="First Name" [formControl]="form.controls.firstName" tabindex="1">
      </div>

      <div class="input-group">
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" placeholder="Last Name" formControlName="lastName" tabindex="2">
      </div>

      <div class="input-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="Email Address" formControlName="email" tabindex="3">
      </div>

      <div class="input-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="Create a password" formControlName="password" tabindex="4">
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="promo-emails" tabindex="5">
        <label for="promo-emails">I agree to receive emails from All in Davao about promotions, events, news, and updates.</label>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="privacy-policy" tabindex="6">
        <label for="privacy-policy">I agree to the <a href="#">Privacy Policy</a> and Terms of Service.</label>
      </div>

      <button type="submit" class="btn-primary" [disabled]="form.invalid" tabindex="7">Create</button>

      <p class="switch-form">
        Already have an account? <a routerLink="/login">Log in</a>
      </p>
    </form>
  </div>

</div>
